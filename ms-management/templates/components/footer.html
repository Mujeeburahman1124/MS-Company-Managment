            </td>
          </tr>

          <!-- Footer Area -->
          <tr>
            <td style="background-color: #f8fafc; border-top: 1px solid #e2e8f0; padding: 32px 24px; color: #64748b; font-size: 12px; line-height: 1.6;">
              <table border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td align="left" style="padding-bottom: 16px;">
                    <strong style="color: #334155; font-size: 13px;">{{companyName}}</strong><br />
                    {{companyAddress}}<br />
                    Phone: {{companyPhone}} | Email: {{companyEmail}}
                  </td>
                </tr>
                <tr>
                  <td align="left" style="border-top: 1px solid #e2e8f0; padding-top: 16px;">
                    <table border="0" cellpadding="0" cellspacing="0" width="100%">
                      <tr>
                        <td align="left">
                          &copy; {{year}} {{companyName}}. All rights reserved.
                        </td>
                        <td align="right">
                          <a href="{{website}}" target="_blank" style="color: {{companyPrimaryColor}}; text-decoration: none; font-weight: 600;">Visit Website</a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
