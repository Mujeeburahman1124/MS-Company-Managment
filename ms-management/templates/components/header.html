<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{subject}}</title>
  <!-- Google Fonts Link -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
  <style type="text/css">
    /* Core Reset Styles */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    table { border-collapse: collapse !important; }
    body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; background-color: #f8fafc; font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

    /* Client-Specific Classes */
    img[class="img-max"] { max-width: 100% !important; width: 100% !important; height: auto !important; }

    /* Responsive Breakpoints */
    @media screen and (max-width: 620px) {
      .container { width: 100% !important; max-width: 100% !important; border-radius: 0px !important; }
      .mobile-padding { padding: 8px 4px !important; }
      .card { padding: 24px 16px !important; }
      .header-logo-td { width: 100% !important; display: block !important; border-right: none !important; padding-right: 0 !important; padding-bottom: 16px !important; }
      .header-info-td { width: 100% !important; display: block !important; padding-left: 0 !important; border-top: 1px dashed #cbd5e1; padding-top: 12px !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f8fafc;">
  <!-- Main Wrapper -->
  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f8fafc; table-layout: fixed;">
    <tr>
      <td align="center" style="padding: 24px 0;" class="mobile-padding">
        <!-- Mail Card Container -->
        <table border="0" cellpadding="0" cellspacing="0" width="600" class="container" style="background-color: #ffffff; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);">
          
          <!-- White Clean Header -->
          <tr>
            <td align="center" style="background-color: #ffffff; padding: 24px 20px; border-bottom: 3px solid {{#if companyPrimaryColor}}{{companyPrimaryColor}}{{else}}#1e3a8a{{/if}};">
              <table border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <!-- Brand Logo and Name Left -->
                  <td align="left" class="header-logo-td" style="vertical-align: middle; width: 62%; border-right: 1px solid #e2e8f0; padding-right: 15px;">
                    <table border="0" cellpadding="0" cellspacing="0">
                      <tr>
                        <td style="vertical-align: middle;">
                          {{#if companyLogo}}
                            <img src="{{companyLogo}}" alt="{{companyName}}" style="max-height: 48px; max-width: 120px; display: block; border-radius: 6px;" />
                          {{else}}
                            <table border="0" cellpadding="0" cellspacing="0" style="background-color: {{#if companyPrimaryColor}}{{companyPrimaryColor}}{{else}}#1e3a8a{{/if}}; border-radius: 8px;">
                              <tr>
                                <td align="center" style="width: 44px; height: 44px; font-size: 18px; font-weight: 900; color: #ffffff; font-family: 'Outfit', Arial, sans-serif;">
                                  {{logoText}}
                                </td>
                              </tr>
                            </table>
                          {{/if}}
                        </td>
                        <td style="padding-left: 12px; vertical-align: middle;">
                          <div style="font-size: 15px; font-weight: 800; font-family: 'Outfit', Arial, sans-serif; letter-spacing: -0.3px; color: #0f172a; line-height: 1.2; text-transform: uppercase;">
                            {{companyName}}
                          </div>
                          <div style="font-size: 9px; color: #64748b; font-family: 'Inter', Arial, sans-serif; margin-top: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;">
                            Right People. Right Opportunity.
                          </div>
                        </td>
                      </tr>
                    </table>
                  </td>
                  
                  <!-- Contact Information Right -->
                  <td align="left" class="header-info-td" style="vertical-align: middle; width: 38%; padding-left: 15px; font-family: 'Inter', Arial, sans-serif; font-size: 10.5px; line-height: 1.5; color: #475569;">
                    <table border="0" cellpadding="0" cellspacing="0" width="100%">
                      <tr>
                        <td style="padding: 1px 0;">✉️ <a href="mailto:{{companyEmail}}" style="color: #0f172a; text-decoration: none; font-weight: 600;">{{companyEmail}}</a></td>
                      </tr>
                      <tr>
                        <td style="padding: 1px 0;">📞 <span style="color: #0f172a; font-weight: 600;">{{companyPhone}}</span></td>
                      </tr>
                      <tr>
                        <td style="padding: 1px 0;">🌐 <a href="{{website}}" target="_blank" style="color: #0f172a; text-decoration: none; font-weight: 600;">{{website}}</a></td>
                      </tr>
                      <tr>
                        <td style="padding: 1px 0; font-size: 9px; color: #64748b; line-height: 1.2;">📍 {{companyAddress}}</td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
          <!-- Banner Alert Box (Clean Style) -->
          {{#if bannerText}}
          <tr>
            <td align="center" style="padding: 20px 24px 0 24px; background-color: #ffffff;">
              <table border="0" cellpadding="0" cellspacing="0" style="display: inline-block;">
                <tr>
                  <td style="font-size: 18px; font-weight: 800; color: {{#if companyPrimaryColor}}{{companyPrimaryColor}}{{else}}#1e3a8a{{/if}}; text-transform: uppercase; font-family: 'Outfit', sans-serif;">
                    <span style="font-size: 22px; vertical-align: middle; display: inline-block; margin-right: 6px;">{{#if bannerIcon}}{{bannerIcon}}{{else}}🔔{{/if}}</span>
                    <span style="vertical-align: middle; letter-spacing: 0.5px;">{{bannerText}}</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          {{/if}}

          <!-- Email Content Body -->
          <tr>
            <td class="card" style="padding: 24px 24px; background-color: #ffffff;">
